
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>NOTA+</title>
  
  <!-- PWA Meta Tags -->
  <link rel="manifest" href="/manifest.json?v=2">
  <meta name="theme-color" content="#2563eb">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="NOTA+">
  <link rel="icon" type="image/jpeg" href="/nota-logo.jpeg">
  <link rel="apple-touch-icon" href="/nota-logo.jpeg">

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    /* Marquee Animation */
    @keyframes marquee-seamless {
      0% { transform: translateX(0); }
      100% { transform: translateX(calc(-50% - 20px)); }
    }
    .animate-marquee-seamless {
      animation: marquee-seamless 10s linear infinite;
    }
    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }
    .no-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
    @media print {
      html, body, #root {
        height: auto !important;
        overflow: visible !important;
        background: white !important;
      }
      .no-print {
        display: none !important;
      }
      .print-area {
        display: block !important;
        width: 100% !important;
        max-width: none !important;
      }
      @page {
        margin: 0.5cm;
      }
    }
    input::-webkit-outer-spin-button,
    input::-webkit-inner-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }
    /* Touch optimization for PWA */
    body {
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }
  </style>
</head>
<body class="bg-gray-50 text-gray-900">
  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
